    body {
        background-color: var(--terminal_background);
        font-family: monospace;
        font-size: 12px;
        line-height: 12px;
    }

    .line {
        cursor: default;
        display: flex;
        margin-bottom: 2px;
    }

    .line span {
        background-color: var(--loc_background);
        color: var(--loc_color);
        margin-right: 6px;
        white-space: pre;
    }


    .line div span {
        margin-right: 0;
    }

    .line .error {
        background-color: var(--error_background);
        color: var(--error_color);
    }

    .line .severe {
        background-color: var(--severeError_background);
        color: var(--severeError_color);
        font-weight: bold;
    }

    .line .savior {
        background-color: var(--savior_background);
        color: var(--savior_color);
        font-weight: bold;
    }

    .line div {
        background-color: var(--line_background);
        color: var(--line_color);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        width: 100%;
        min-width: 0;
        min-height: 12px;
    }

    .line span.editor {
        background-color: var(--editor_loc_background);
        color: var(--editor_loc_color);
    }

    .line textarea.editor {
        background-color: var(--editor_background);
        color: var(--editor_color);
        border: none;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        width: 100%;
        min-width: 0;
        overflow-y: hidden;
        resize: none;
        font-size: 12px;
        padding: 0;
        line-height: 12px;
    }

    textarea:focus {
        outline: none;
    }

    div[contenteditable] {
        outline: none;
    }

    .line .enabled {
        color: var(--enabled_color);
        background-color: var(--enabled_background);
    }

    .line .disabled {
        color: var(--disabled_color);
        background-color: var(--disabled_background);
    }

    .line .highlight {
        background-color: var(--highlight_background);
        color: var(--highlight_color);
        margin-right: 0;
        height: 12px;
    }

</style>
